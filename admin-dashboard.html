<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Ivoiservice</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇨🇮</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    
    .photo-card {
      position: relative;
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .photo-card:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow-md);
    }
    
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .photo-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .photo-modal.active {
      display: flex;
    }
    
    .photo-modal-content {
      position: relative;
      max-width: 90%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    
    .photo-modal img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
    }
    
    .photo-modal-actions {
      display: flex;
      gap: 1rem;
    }
    
    .photo-modal .close-btn {
      position: absolute;
      top: -3rem;
      right: 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: white;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .provider-card {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem;
    }
    
    .provider-card:last-child {
      border-bottom: none;
    }
    
    .pending-badge {
      display: inline-block;
      background: #F59E0B;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <i class="fas fa-handshake"></i>
          <span>Ivoiservice</span>
        </a>
        <ul class="nav-links">
          <li><button onclick="logout()" class="btn btn-outline btn-sm">Déconnexion</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="services">
    <div class="container">
      <h1 class="section-title">
        <i class="fas fa-shield-alt text-primary"></i>
        Dashboard Administrateur
      </h1>
      
      <div class="stats-grid mb-lg">
        <div class="stat-card">
          <div class="stat-value" id="totalUsers">0</div>
          <div class="stat-label">Utilisateurs</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalClients">0</div>
          <div class="stat-label">Clients</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalProviders">0</div>
          <div class="stat-label">Prestataires</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="activeSubscriptions">0</div>
          <div class="stat-label">Abonnements actifs</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="pendingPhotos">0</div>
          <div class="stat-label">Photos en attente</div>
        </div>
      </div>
      
      <div class="tabs mb-md">
        <button class="tab active" onclick="switchTab('photos')">📷 Photos à valider</button>
        <button class="tab" onclick="switchTab('users')">Utilisateurs</button>
        <button class="tab" onclick="switchTab('providers')">Prestataires à vérifier</button>
        <button class="tab" onclick="switchTab('subscriptions')">Abonnements</button>
      </div>
      
      <!-- NOUVEL ONGLET: Validation des photos -->
      <div class="tab-content active" id="photos-content">
        <div class="card">
          <h2><i class="fas fa-camera text-primary"></i> Photos en attente de validation</h2>
          <div id="photosValidationList"></div>
        </div>
      </div>
      
      <div class="tab-content" id="users-content">
        <div class="card">
          <h2><i class="fas fa-users text-primary"></i> Tous les utilisateurs</h2>
          <div class="table-container">
            <table id="usersTable"></table>
          </div>
        </div>
      </div>
      
      <div class="tab-content" id="providers-content">
        <div class="card">
          <h2><i class="fas fa-user-check text-primary"></i> Prestataires en attente de vérification</h2>
          <div id="providersVerificationList"></div>
        </div>
      </div>
      
      <div class="tab-content" id="subscriptions-content">
        <div class="card">
          <h2><i class="fas fa-receipt text-primary"></i> Abonnements</h2>
          <div class="table-container">
            <table id="subscriptionsTable"></table>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Ivoiservice. Tous droits réservés. 🇨🇮</p>
      </div>
    </div>
  </footer>

  <!-- Modal pour afficher photo en grand -->
  <div class="photo-modal" id="photoModal">
    <div class="photo-modal-content">
      <button class="close-btn" onclick="closePhotoModal()">
        <i class="fas fa-times"></i>
      </button>
      <img id="modalImage" src="" alt="Photo">
      <div class="photo-modal-actions">
        <button class="btn btn-success btn-lg" onclick="approveCurrentPhoto()">
          <i class="fas fa-check"></i> Approuver
        </button>
        <button class="btn btn-error btn-lg" onclick="rejectCurrentPhoto()">
          <i class="fas fa-times"></i> Rejeter
        </button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/search.js"></script>
  <script src="js/subscription.js"></script>
  <script>
    let currentPhotoData = null; // Stocke les données de la photo actuellement affichée
    
    if (!Utils.requireRole('ADMIN')) {
      // Redirection gérée par requireRole
    } else {
      loadDashboard();
    }
    
    function loadDashboard() {
      loadStats();
      loadPhotosValidation();
      loadUsers();
      loadProvidersVerification();
      loadSubscriptions();
    }
    
    function loadStats() {
      const users = Utils.Storage.get('users', []);
      const clients = users.filter(u => u.role === 'CLIENT');
      const providers = users.filter(u => u.role === 'PROVIDER');
      const subStats = Subscription.getSubscriptionStats();
      const pendingPhotos = Auth.getPendingPhotos();
      
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('totalClients').textContent = clients.length;
      document.getElementById('totalProviders').textContent = providers.length;
      document.getElementById('activeSubscriptions').textContent = subStats.active;
      document.getElementById('pendingPhotos').textContent = pendingPhotos.length;
    }
    
    // ========================================
    // VALIDATION DES PHOTOS
    // ========================================
    
    function loadPhotosValidation() {
      const pendingPhotos = Auth.getPendingPhotos();
      const list = document.getElementById('photosValidationList');
      
      if (pendingPhotos.length === 0) {
        list.innerHTML = '<p class="text-light text-center" style="padding: 2rem;">Aucune photo en attente de validation</p>';
        return;
      }
      
      list.innerHTML = pendingPhotos.map(item => {
        const { photo, profile, user } = item;
        const professionName = Utils.PROFESSIONS[profile.profession] || profile.profession;
        
        return `
          <div class="provider-card">
            <div style="display: flex; justify-content: space-between; align-items: start; gap: 2rem; flex-wrap: wrap;">
              <div style="flex: 1; min-width: 250px;">
                <h3 style="margin-bottom: 0.5rem;">
                  ${user ? user.firstName + ' ' + user.lastName : 'Prestataire'}
                  <span class="pending-badge">⏳ En attente</span>
                </h3>
                <p style="color: var(--text-light); margin: 0.25rem 0;">
                  <i class="fas ${Utils.PROFESSION_ICONS[profile.profession]}"></i> ${professionName}
                </p>
                <p style="color: var(--text-light); margin: 0.25rem 0;">
                  <i class="fas fa-phone"></i> ${Utils.formatPhoneNumber(user.phone)}
                </p>
                <small class="text-light">
                  Photo uploadée le ${Utils.formatDateTime(photo.uploadedAt)}
                </small>
              </div>
              
              <div style="flex: 1; min-width: 200px;">
                <div class="photo-grid" style="max-width: 150px;">
                  <div class="photo-card" onclick='openPhotoModal(${JSON.stringify(photo).replace(/'/g, "&apos;")}, "${profile.id}")'>
                    <img src="${photo.url}" alt="Photo de travail">
                  </div>
                </div>
              </div>
              
              <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <button onclick="approvePhoto('${profile.id}', '${photo.id}')" class="btn btn-success btn-sm">
                  <i class="fas fa-check"></i> Approuver
                </button>
                <button onclick="rejectPhoto('${profile.id}', '${photo.id}')" class="btn btn-error btn-sm">
                  <i class="fas fa-times"></i> Rejeter
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function openPhotoModal(photo, profileId) {
      currentPhotoData = { photo, profileId };
      document.getElementById('modalImage').src = photo.url;
      document.getElementById('photoModal').classList.add('active');
    }
    
    function closePhotoModal() {
      currentPhotoData = null;
      document.getElementById('photoModal').classList.remove('active');
    }
    
    function approveCurrentPhoto() {
      if (!currentPhotoData) return;
      approvePhoto(currentPhotoData.profileId, currentPhotoData.photo.id);
      closePhotoModal();
    }
    
    function rejectCurrentPhoto() {
      if (!currentPhotoData) return;
      rejectPhoto(currentPhotoData.profileId, currentPhotoData.photo.id);
      closePhotoModal();
    }
    
    function approvePhoto(profileId, photoId) {
      const result = Auth.updatePhotoStatus(profileId, photoId, 'APPROVED');
      
      if (result.success) {
        Utils.showToast('Photo approuvée', 'success');
        loadDashboard();
      } else {
        Utils.showToast(result.message, 'error');
      }
    }
    
    function rejectPhoto(profileId, photoId) {
      if (!confirm('Voulez-vous vraiment rejeter cette photo ?')) return;
      
      const result = Auth.updatePhotoStatus(profileId, photoId, 'REJECTED');
      
      if (result.success) {
        Utils.showToast('Photo rejetée', 'info');
        loadDashboard();
      } else {
        Utils.showToast(result.message, 'error');
      }
    }
    
    // ========================================
    // AUTRES ONGLETS (code existant)
    // ========================================
    
    function loadUsers() {
      const users = Utils.Storage.get('users', []);
      const table = document.getElementById('usersTable');
      
      const roleColors = { CLIENT: 'primary', PROVIDER: 'warning', ADMIN: 'error' };
      
      table.innerHTML = `
        <thead>
          <tr>
            <th>Nom</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th>Rôle</th>
            <th>Date d'inscription</th>
          </tr>
        </thead>
        <tbody>
          ${users.map(user => `
            <tr>
              <td>${user.firstName} ${user.lastName}</td>
              <td>${user.email}</td>
              <td>${Utils.formatPhoneNumber(user.phone)}</td>
              <td><span class="badge badge-${roleColors[user.role]}">${user.role}</span></td>
              <td>${Utils.formatDate(user.createdAt)}</td>
            </tr>
          `).join('')}
        </tbody>
      `;
    }
    
    function loadProvidersVerification() {
      const providerProfiles = Utils.Storage.get('providerProfiles', []);
      const users = Utils.Storage.get('users', []);
      const list = document.getElementById('providersVerificationList');
      
      const unverified = providerProfiles.filter(p => !p.isVerified);
      
      if (unverified.length === 0) {
        list.innerHTML = '<p class="text-light text-center" style="padding: 2rem;">Tous les prestataires sont vérifiés</p>';
        return;
      }
      
      list.innerHTML = unverified.map(profile => {
        const user = users.find(u => u.id === profile.userId);
        if (!user) return '';
        
        const professionName = Utils.PROFESSIONS[profile.profession];
        
        return `
          <div style="padding: 1.5rem; border-bottom: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
              <div>
                <strong>${user.firstName} ${user.lastName}</strong>
                <p style="color: var(--text-light); margin: 0.25rem 0;">
                  ${professionName} - ${Utils.formatPhoneNumber(user.phone)}
                </p>
                <small class="text-light">Inscrit le ${Utils.formatDate(user.createdAt)}</small>
              </div>
              <div style="display: flex; gap: 0.5rem;">
                <button onclick="verifyProvider('${profile.id}', true)" class="btn btn-success btn-sm">
                  <i class="fas fa-check"></i> Vérifier
                </button>
                <button onclick="verifyProvider('${profile.id}', false)" class="btn btn-outline btn-sm">
                  <i class="fas fa-times"></i> Refuser
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function loadSubscriptions() {
      const subscriptions = Utils.Storage.get('subscriptions', []);
      const users = Utils.Storage.get('users', []);
      const table = document.getElementById('subscriptionsTable');
      
      const statusColors = { ACTIVE: 'success', EXPIRED: 'warning', CANCELLED: 'error' };
      
      table.innerHTML = `
        <thead>
          <tr>
            <th>Client</th>
            <th>Montant</th>
            <th>Date début</th>
            <th>Date fin</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody>
          ${subscriptions.map(sub => {
            const user = users.find(u => u.id === sub.userId);
            return `
              <tr>
                <td>${user ? user.firstName + ' ' + user.lastName : 'N/A'}</td>
                <td>${Utils.formatPrice(sub.amount)}</td>
                <td>${Utils.formatDate(sub.startDate)}</td>
                <td>${Utils.formatDate(sub.endDate)}</td>
                <td><span class="badge badge-${statusColors[sub.status]}">${sub.status}</span></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      `;
    }
    
    function verifyProvider(profileId, approve) {
      const providerProfiles = Utils.Storage.get('providerProfiles', []);
      const index = providerProfiles.findIndex(p => p.id === profileId);
      
      if (index === -1) return;
      
      if (approve) {
        providerProfiles[index].isVerified = true;
        Utils.Storage.set('providerProfiles', providerProfiles);
        Utils.showToast('Prestataire vérifié avec succès', 'success');
      } else {
        Utils.showToast('Vérification refusée', 'info');
      }
      
      loadDashboard();
    }
    
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(tabName + '-content').classList.add('active');
    }
    
    function logout() {
      if (confirm('Voulez-vous vous déconnecter ?')) {
        Utils.Session.logout();
        Utils.showToast('Déconnexion réussie', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      }
    }
    
    // Fermer le modal en cliquant en dehors
    document.getElementById('photoModal').addEventListener('click', (e) => {
      if (e.target.id === 'photoModal') {
        closePhotoModal();
      }
    });
  </script>
</body>
</html>
