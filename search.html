<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recherche - Ivoiservice</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇨🇮</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .tabs{display:flex;gap:1rem;margin-bottom:2rem;border-bottom:2px solid #e0e0e0}
    .tab-btn{padding:1rem 2rem;background:none;border:none;font-size:1rem;font-weight:500;color:#666;cursor:pointer;position:relative;transition:color 0.3s}
    .tab-btn.active{color:#009E60}
    .tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:#009E60}
    .distance-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.25rem 0.75rem;background:#E3F2FD;color:#1976D2;border-radius:8px;font-size:0.85rem;font-weight:500;margin-top:0.5rem}
    .freelance-badge{display:inline-flex;align-items:center;gap:0.25rem;padding:0.25rem 0.5rem;background:#FF9800;color:white;border-radius:4px;font-size:0.75rem;font-weight:500;margin-left:0.5rem}
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <i class="fas fa-handshake"></i>
          <span>Ivoiservice</span>
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Accueil</a></li>
          <li><a href="search.html">Rechercher</a></li>
          <li id="authLinks">
            <a href="login.html" class="btn btn-outline btn-sm">Connexion</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="services">
    <div class="container">
      <h1 class="section-title">
        <i class="fas fa-search text-primary"></i>
        Trouver un prestataire
      </h1>
      <p class="section-subtitle">Trouvez des professionnels vérifiés près de chez vous</p>
      
      <div class="tabs">
        <button class="tab-btn active" id="tab-classic" onclick="switchTab('classic')">
          <i class="fas fa-briefcase"></i> Services classiques
        </button>
        <button class="tab-btn" id="tab-freelance" onclick="switchTab('freelance')">
          <i class="fas fa-user"></i> Freelances
        </button>
      </div>
      
      <div class="card mb-lg">
        <h3 style="margin-bottom:1rem">
          <i class="fas fa-filter text-primary"></i>
          Filtres de recherche
        </h3>
        
        <div class="grid-responsive">
          <div class="form-group">
            <label class="form-label" for="professionFilter">
              <i class="fas fa-briefcase"></i> <span id="professionLabel">Profession</span>
            </label>
            <select id="professionFilter" class="form-input"></select>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="distanceFilter">
              <i class="fas fa-map-marker-alt"></i> Distance max (km)
            </label>
            <input type="number" id="distanceFilter" class="form-input" value="10" min="1" max="50">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="minRatingFilter">
              <i class="fas fa-star"></i> Note minimale
            </label>
            <select id="minRatingFilter" class="form-input">
              <option value="">Toutes</option>
              <option value="4.5">⭐ 4.5+</option>
              <option value="4.0">⭐ 4.0+</option>
              <option value="3.5">⭐ 3.5+</option>
            </select>
          </div>
        </div>
        
        <button onclick="applyFilters()" class="btn btn-primary btn-full mt-md">
          <i class="fas fa-search"></i> Rechercher
        </button>
      </div>
      
      <div id="resultsCount" class="mb-md" style="display:none">
        <p><i class="fas fa-info-circle"></i> <span id="countText"></span></p>
      </div>
      
      <div id="loading" class="hidden"><div class="spinner"></div></div>
      <div id="results" class="services-grid"></div>
      
      <div id="noResults" class="hidden">
        <div class="card text-center">
          <i class="fas fa-search" style="font-size:4rem;color:#ddd;margin-bottom:1rem"></i>
          <h3>Aucun prestataire trouvé</h3>
          <p class="text-light">Élargissez vos critères de recherche</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Ivoiservice. Tous droits réservés. 🇨🇮</p>
    </div>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/search.js"></script>
  <script>
    let currentTab='classic';
    let userLocation=null;
    let allProviders=[];
    
    const CLASSIC_PROFESSIONS={'ALL':'Toutes','PLOMBIER':'🔧 Plombier','ELECTRICIEN':'⚡ Électricien','MENUISIER':'🪚 Menuisier','MACON':'🧱 Maçon','PEINTRE':'🎨 Peintre','GARAGISTE':'🚗 Garagiste','FRIGORISTE':'❄️ Frigoriste','SERRURIER':'🔑 Serrurier','REPARATEUR_TELEPHONE':'📱 Réparateur téléphone','MECANICIEN_MOTO':'🏍️ Mécanicien moto'};
    const FREELANCE_PROFESSIONS={'ALL':'Toutes','DEVELOPPEUR_WEB':'💻 Développeur Web','GRAPHISTE':'🎨 Graphiste','REDACTEUR':'✍️ Rédacteur','PHOTOGRAPHE':'📷 Photographe','VIDEASTE':'🎬 Vidéaste','TRADUCTEUR':'🌍 Traducteur','COMMUNITY_MANAGER':'📱 Community Manager','COMPTABLE':'💼 Comptable','MARKETING':'📊 Marketing'};
    
    function switchTab(tab){
      currentTab=tab;
      document.getElementById('tab-classic').classList.toggle('active',tab==='classic');
      document.getElementById('tab-freelance').classList.toggle('active',tab==='freelance');
      
      const professionSelect=document.getElementById('professionFilter');
      const professionLabel=document.getElementById('professionLabel');
      const professions=tab==='freelance'?FREELANCE_PROFESSIONS:CLASSIC_PROFESSIONS;
      
      professionLabel.textContent=tab==='freelance'?'Spécialité':'Profession';
      professionSelect.innerHTML='';
      
      for(const[value,label]of Object.entries(professions)){
        const option=document.createElement('option');
        option.value=value;
        option.textContent=label;
        professionSelect.appendChild(option);
      }
      
      applyFilters();
    }
    
    function applyFilters(){
      const profession=document.getElementById('professionFilter').value;
      const maxDistance=parseFloat(document.getElementById('distanceFilter').value)||50;
      const minRating=parseFloat(document.getElementById('minRatingFilter').value)||0;
      
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('results').innerHTML='';
      document.getElementById('noResults').classList.add('hidden');
      document.getElementById('resultsCount').style.display='none';
      
      setTimeout(function(){
        let filtered=allProviders.filter(function(p){
          const isFreelance=p.isFreelance===true;
          if(currentTab==='freelance'&&!isFreelance)return false;
          if(currentTab==='classic'&&isFreelance)return false;
          if(profession&&profession!=='ALL'&&p.profession!==profession)return false;
          if(p.distance>maxDistance)return false;
          if(p.rating<minRating)return false;
          return true;
        });
        
        filtered.sort(function(a,b){return a.distance-b.distance});
        displayResults(filtered);
        document.getElementById('loading').classList.add('hidden');
      },500);
    }
    
    function displayResults(providers){
      const container=document.getElementById('results');
      container.innerHTML='';
      
      if(providers.length===0){
        document.getElementById('noResults').classList.remove('hidden');
        return;
      }
      
      document.getElementById('resultsCount').style.display='block';
      const typeText=currentTab==='freelance'?'freelance':'prestataire';
      document.getElementById('countText').textContent=providers.length+' '+typeText+(providers.length>1?'s':'')+' trouvé'+(providers.length>1?'s':'');
      
      providers.forEach(function(p){
        const card=createProviderCard(p);
        container.appendChild(card);
      });
    }
    
    function createProviderCard(p){
      const card=document.createElement('div');
      card.className='provider-card';
      card.onclick=function(){window.location.href='provider-profile.html?id='+p.userId};
      
      const icon=Utils.PROFESSION_ICONS[p.profession]||'fa-briefcase';
      const name=Utils.PROFESSIONS[p.profession]||p.profession;
      const distance=p.distance.toFixed(1);
      const color=distance<2?'#4CAF50':distance<5?'#FF9800':'#1976D2';
      const freelanceBadge=p.isFreelance?'<span class="freelance-badge"><i class="fas fa-star"></i> Freelance</span>':'';
      
      card.innerHTML='<div class="provider-avatar"><i class="fas '+icon+'"></i></div><div class="provider-info"><h3 class="provider-name">'+p.firstName+' '+p.lastName+(p.verified?' <i class="fas fa-check-circle" style="color:#4CAF50"></i>':'')+freelanceBadge+'</h3><p class="provider-profession"><i class="fas '+icon+'"></i> '+name+'</p><div class="distance-badge" style="background:'+color+'22;color:'+color+'"><i class="fas fa-location-arrow"></i> À '+distance+' km</div><div class="provider-rating">'+Utils.generateStars(p.rating||0)+'<span style="margin-left:0.25rem">'+p.rating.toFixed(1)+'/5 ('+p.reviewCount+' avis)</span></div><div class="provider-meta"><span><i class="fas fa-map-marker-alt"></i> Rayon: '+p.serviceRadius+' km</span><span style="font-weight:600;color:#009E60">'+Utils.formatPrice(p.basePrice)+'</span></div></div>';
      
      return card;
    }
    
    document.addEventListener('DOMContentLoaded',async function(){
      try{
        userLocation=await Utils.getUserLocation();
      }catch(error){
        userLocation=Utils.getAbidjanCoordinates();
      }
      
      allProviders=Search.getAllProviders();
      allProviders=allProviders.map(function(p){
        const distance=Utils.calculateDistance(userLocation.latitude,userLocation.longitude,p.coordinates.latitude,p.coordinates.longitude);
        return Object.assign({},p,{distance:distance});
      });
      
      switchTab('classic');
    });
  </script>
</body>
</html>
