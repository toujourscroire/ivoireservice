<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rechercher un prestataire - Ivoiservice</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ff6600'/><rect x='33.33' width='66.67' height='100' fill='white'/><rect x='66.67' width='33.33' height='100' fill='%23009e60'/></svg>" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .search-header {
            background: linear-gradient(135deg, #009E60 0%, #007A4A 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        
        .search-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .search-form {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #333;
            font-size: 0.9rem;
        }
        
        .form-group select,
        .form-group input {
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #009E60;
        }
        
        .search-btn {
            width: 100%;
            padding: 1rem;
            background: #009E60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 1rem;
        }
        
        .search-btn:hover {
            background: #007A4A;
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }
        
        .tab.active {
            color: #009E60;
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #009E60;
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .results-count {
            font-size: 1.1rem;
            color: #333;
            font-weight: 500;
        }
        
        .toggle-map {
            padding: 0.75rem 1.5rem;
            background: white;
            border: 1px solid #009E60;
            color: #009E60;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .toggle-map:hover {
            background: #009E60;
            color: white;
        }
        
        .map-container {
            height: 400px;
            background: #f5f5f5;
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow: hidden;
            display: none;
        }
        
        .map-container.show {
            display: block;
        }
        
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .provider-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .provider-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        
        .provider-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        
        .provider-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.25rem;
        }
        
        .verified-badge {
            background: #4CAF50;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .freelance-badge {
            background: #FF9800;
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 0.5rem;
        }
        
        .distance-badge {
            background: #E3F2FD;
            color: #1976D2;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .provider-profession {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }
        
        .provider-rating {
            color: #FFA500;
            margin-bottom: 1rem;
        }
        
        .provider-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #666;
        }
        
        .info-item i {
            color: #009E60;
            width: 16px;
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        
        .no-results i {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 1rem;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
        
        .loading i {
            font-size: 2rem;
            color: #009E60;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .results-header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="logo">
                    <i class="fas fa-tools"></i>
                    <span>Ivoiservice</span>
                </a>
                <div class="nav-links">
                    <a href="index.html">Accueil</a>
                    <a href="client-dashboard.html">Mon espace</a>
                    <button onclick="handleLogout()" class="btn-secondary">
                        <i class="fas fa-sign-out-alt"></i>
                        Déconnexion
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Search Header -->
    <div class="search-header">
        <div class="search-container">
            <h1><i class="fas fa-search"></i> Rechercher un prestataire</h1>
            <p style="margin-top: 0.5rem; opacity: 0.9;">Trouvez des professionnels vérifiés près de chez vous à Abidjan</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="search-container">
        <!-- Search Form -->
        <div class="search-form">
            <form id="searchForm" onsubmit="event.preventDefault(); performSearch();">
                <div class="form-row">
                    <div class="form-group">
                        <label for="profession">Profession recherchée</label>
                        <select id="profession" name="profession">
                            <option value="">Toutes les professions</option>
                            <option value="PLOMBIER">🔧 Plombier</option>
                            <option value="ELECTRICIEN">⚡ Électricien</option>
                            <option value="MENUISIER">🪚 Menuisier</option>
                            <option value="MAÇON">🧱 Maçon</option>
                            <option value="PEINTRE">🎨 Peintre</option>
                            <option value="GARAGISTE">🚗 Garagiste</option>
                            <option value="FRIGORISTE">❄️ Frigoriste</option>
                            <option value="SERRURIER">🔑 Serrurier</option>
                            <option value="RÉPARATEUR_TÉLÉPHONE">📱 Réparateur téléphone</option>
                            <option value="MÉCANICIEN_MOTO">🏍️ Mécanicien moto</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="maxDistance">Distance maximale (km)</label>
                        <input type="number" id="maxDistance" name="maxDistance" min="1" max="50" value="10" placeholder="Ex: 10">
                    </div>
                    
                    <div class="form-group">
                        <label for="minRating">Note minimale</label>
                        <select id="minRating" name="minRating">
                            <option value="">Toutes les notes</option>
                            <option value="4.5">⭐ 4,5+</option>
                            <option value="4.0">⭐ 4,0+</option>
                            <option value="3.5">⭐ 3,5+</option>
                            <option value="3.0">⭐ 3,0+</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="search-btn">
                    <i class="fas fa-search"></i> Rechercher
                </button>
            </form>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('classic')" id="tab-classic">
                <i class="fas fa-briefcase"></i> Services classiques
            </button>
            <button class="tab" onclick="switchTab('freelance')" id="tab-freelance">
                <i class="fas fa-user"></i> Freelances
            </button>
        </div>

        <!-- Results Header -->
        <div class="results-header">
            <div class="results-count" id="resultsCount">
                Chargement...
            </div>
            <button class="toggle-map" onclick="toggleMap()">
                <i class="fas fa-map"></i> <span id="mapBtnText">Voir la carte</span>
            </button>
        </div>

        <!-- Map Container -->
        <div class="map-container" id="mapContainer">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d127242.3636!2d-4.0083!3d5.3599!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfc1ec9f47c17797%3A0x8cb53bca0e52c031!2sAbidjan%2C%20C%C3%B4te%20d&#39;Ivoire!5e0!3m2!1sfr!2sfr!4v1640000000000!5m2!1sfr!2sfr" 
                loading="lazy">
            </iframe>
        </div>

        <!-- Results Grid -->
        <div id="resultsContainer">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>Recherche en cours...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Ivoiservice. Tous droits réservés.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/search.js"></script>
    <script src="js/subscription.js"></script>
    
    <script>
        let currentTab = 'classic';
        let userLocation = null;
        let allProviders = [];
        let filteredProviders = [];

        // Initialisation au chargement
        document.addEventListener('DOMContentLoaded', async function() {
            // Vérifier que l'utilisateur est connecté
            if (!Utils.Session.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            // Obtenir la localisation de l'utilisateur
            try {
                userLocation = await Utils.getUserLocation();
                console.log('📍 Position utilisateur:', userLocation);
            } catch (error) {
                console.warn('⚠️ Géolocalisation échouée, utilisation de coordonnées par défaut');
                userLocation = Utils.getAbidjanCoordinates();
            }

            // Charger tous les prestataires
            allProviders = Search.getAllProviders();
            console.log('👥 Prestataires chargés:', allProviders.length);

            // Afficher les résultats initiaux
            performSearch();
        });

        // Effectuer la recherche
        function performSearch() {
            const profession = document.getElementById('profession').value;
            const maxDistance = parseFloat(document.getElementById('maxDistance').value) || 50;
            const minRating = parseFloat(document.getElementById('minRating').value) || 0;

            console.log('🔍 Recherche:', { profession, maxDistance, minRating, currentTab });

            // Filtrer les prestataires
            filteredProviders = allProviders.filter(provider => {
                // Vérifier le type (classic ou freelance)
                const isFreelance = provider.isFreelance === true;
                if (currentTab === 'freelance' && !isFreelance) return false;
                if (currentTab === 'classic' && isFreelance) return false;

                // Vérifier la profession
                if (profession && provider.profession !== profession) return false;

                // Calculer la distance
                const distance = Utils.calculateDistance(
                    userLocation.latitude,
                    userLocation.longitude,
                    provider.coordinates.latitude,
                    provider.coordinates.longitude
                );
                provider.distance = distance;

                // Vérifier la distance max
                if (distance > maxDistance) return false;

                // Vérifier la note minimale
                if (provider.rating < minRating) return false;

                return true;
            });

            // Trier par distance (les plus proches en premier)
            filteredProviders.sort((a, b) => a.distance - b.distance);

            console.log('✅ Résultats filtrés:', filteredProviders.length);

            // Afficher les résultats
            displayResults();
        }

        // Afficher les résultats
        function displayResults() {
            const container = document.getElementById('resultsContainer');
            const countEl = document.getElementById('resultsCount');

            // Mettre à jour le compteur
            const typeText = currentTab === 'freelance' ? 'freelances' : 'prestataires';
            countEl.textContent = `${filteredProviders.length} ${typeText} trouvé(s)`;

            // Si aucun résultat
            if (filteredProviders.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>Aucun prestataire trouvé</h3>
                        <p>Essayez d'élargir vos critères de recherche</p>
                    </div>
                `;
                return;
            }

            // Afficher les cartes
            container.innerHTML = `
                <div class="results-grid">
                    ${filteredProviders.map(provider => createProviderCard(provider)).join('')}
                </div>
            `;
        }

        // Créer une carte prestataire
        function createProviderCard(provider) {
            const verifiedBadge = provider.verified 
                ? '<span class="verified-badge"><i class="fas fa-check-circle"></i> Vérifié</span>' 
                : '';
            
            const freelanceBadge = provider.isFreelance 
                ? '<span class="freelance-badge"><i class="fas fa-star"></i> Freelance</span>' 
                : '';

            const distance = provider.distance.toFixed(1);
            const distanceColor = distance < 2 ? '#4CAF50' : distance < 5 ? '#FF9800' : '#1976D2';

            return `
                <div class="provider-card" onclick="viewProfile('${provider.userId}')">
                    <div class="provider-header">
                        <div>
                            <div class="provider-name">
                                ${provider.name}
                                ${verifiedBadge}
                                ${freelanceBadge}
                            </div>
                        </div>
                    </div>
                    
                    <div class="distance-badge" style="background: ${distanceColor}22; color: ${distanceColor};">
                        <i class="fas fa-location-arrow"></i>
                        À ${distance} km de vous
                    </div>
                    
                    <div class="provider-profession">
                        ${Utils.PROFESSION_ICONS[provider.profession] || '🔧'} ${formatProfession(provider.profession)}
                    </div>
                    
                    <div class="provider-rating">
                        ${Utils.generateStars(provider.rating)}
                        <span style="color: #333; margin-left: 0.5rem;">${provider.rating}/5</span>
                        <span style="color: #666; margin-left: 0.25rem;">(${provider.reviewCount} avis)</span>
                    </div>
                    
                    <div class="provider-info">
                        <div class="info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>Rayon d'intervention: ${provider.serviceRadius} km</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-coins"></i>
                            <span>À partir de ${Utils.formatPrice(provider.basePrice)}</span>
                        </div>
                        ${provider.isFreelance && provider.portfolio && provider.portfolio.length > 0 
                            ? `<div class="info-item">
                                <i class="fas fa-images"></i>
                                <span>${provider.portfolio.length} photo(s) de réalisations</span>
                               </div>` 
                            : ''
                        }
                    </div>
                </div>
            `;
        }

        // Formater le nom de la profession
        function formatProfession(profession) {
            return profession
                .toLowerCase()
                .replace(/_/g, ' ')
                .replace(/\b\w/g, l => l.toUpperCase());
        }

        // Voir le profil d'un prestataire
        function viewProfile(userId) {
            window.location.href = `provider-profile.html?id=${userId}`;
        }

        // Changer d'onglet
        function switchTab(tab) {
            currentTab = tab;
            
            // Mettre à jour l'UI des onglets
            document.getElementById('tab-classic').classList.toggle('active', tab === 'classic');
            document.getElementById('tab-freelance').classList.toggle('active', tab === 'freelance');
            
            // Relancer la recherche
            performSearch();
        }

        // Afficher/masquer la carte
        function toggleMap() {
            const mapContainer = document.getElementById('mapContainer');
            const btnText = document.getElementById('mapBtnText');
            
            mapContainer.classList.toggle('show');
            
            if (mapContainer.classList.contains('show')) {
                btnText.textContent = 'Masquer la carte';
            } else {
                btnText.textContent = 'Voir la carte';
            }
        }

        // Déconnexion
        function handleLogout() {
            if (confirm('Voulez-vous vraiment vous déconnecter ?')) {
                Utils.Session.logout();
                Utils.showToast('Vous êtes déconnecté', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }
    </script>
</body>
</html>
