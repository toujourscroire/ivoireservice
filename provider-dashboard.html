<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Prestataire - Ivoiservice</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇨🇮</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <i class="fas fa-handshake"></i>
          <span>Ivoiservice</span>
        </a>
        <ul class="nav-links">
          <li><button onclick="logout()" class="btn btn-outline btn-sm">Déconnexion</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="services">
    <div class="container">
      <h1 class="section-title">
        <i class="fas fa-user-tie text-primary"></i>
        Mon espace prestataire
      </h1>
      
      <div id="verificationStatus" class="card mb-lg"></div>
      
      <div class="stats-grid mb-lg">
        <div class="stat-card">
          <div class="stat-value" id="ratingValue">0.0</div>
          <div class="stat-label">Note moyenne</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="reviewsValue">0</div>
          <div class="stat-label">Avis clients</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="requestsValue">0</div>
          <div class="stat-label">Demandes reçues</div>
        </div>
      </div>
      
      <div class="card">
        <h2><i class="fas fa-inbox text-primary"></i> Demandes de service</h2>
        <div id="requestsList"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Ivoiservice. Tous droits réservés. 🇨🇮</p>
      </div>
    </div>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/search.js"></script>
  <script>
    if (!Utils.requireRole('PROVIDER')) {
      // Redirection gérée par requireRole
    } else {
      loadDashboard();
    }
    
    function loadDashboard() {
      const user = Utils.Session.getCurrentUser();
      const profile = Auth.getProviderProfile(user.id);
      
      if (!profile) {
        Utils.showToast('Profil prestataire non trouvé', 'error');
        return;
      }
      
      loadVerificationStatus(profile);
      loadStats(profile);
      loadRequests();
    }
    
    function loadVerificationStatus(profile) {
      const statusDiv = document.getElementById('verificationStatus');
      
      if (profile.isVerified) {
        statusDiv.innerHTML = `
          <div class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span><strong>Profil vérifié</strong> - Votre identité a été validée par notre équipe</span>
          </div>
        `;
      } else {
        statusDiv.innerHTML = `
          <div class="alert alert-warning">
            <i class="fas fa-exclamation-triangle"></i>
            <div style="flex: 1;">
              <strong>Vérification en attente</strong>
              <p style="margin: 0.5rem 0 0;">Soumettez votre CNI et un selfie pour être vérifié et gagner la confiance des clients</p>
            </div>
          </div>
        `;
      }
    }
    
    function loadStats(profile) {
      document.getElementById('ratingValue').textContent = (profile.rating || 0).toFixed(1);
      document.getElementById('reviewsValue').textContent = profile.reviewCount || 0;
      
      const user = Utils.Session.getCurrentUser();
      const requests = Search.getProviderRequests(user.id);
      document.getElementById('requestsValue').textContent = requests.length;
    }
    
    function loadRequests() {
      const user = Utils.Session.getCurrentUser();
      const requests = Search.getProviderRequests(user.id);
      const requestsList = document.getElementById('requestsList');
      
      if (requests.length === 0) {
        requestsList.innerHTML = '<p class="text-light text-center" style="padding: 2rem;">Aucune demande pour le moment</p>';
        return;
      }
      
      const users = Utils.Storage.get('users', []);
      requestsList.innerHTML = requests.map(request => {
        const client = users.find(u => u.id === request.clientId);
        const statusColors = { PENDING: 'warning', ACCEPTED: 'success', COMPLETED: 'success', CANCELLED: 'error' };
        return `
          <div style="padding: 1.5rem; border-bottom: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 1rem;">
              <div style="flex: 1;">
                <strong>${client ? client.firstName + ' ' + client.lastName : 'Client'}</strong>
                ${client ? '<span class="text-light"> - ' + Utils.formatPhoneNumber(client.phone) + '</span>' : ''}
                <p style="color: var(--text-light); margin: 0.5rem 0;">${request.description}</p>
                <small class="text-light">${Utils.formatDateTime(request.createdAt)}</small>
              </div>
              <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <span class="badge badge-${statusColors[request.status]}">${request.status}</span>
                ${request.status === 'PENDING' ? `
                  <button onclick="updateStatus('${request.id}', 'ACCEPTED')" class="btn btn-primary btn-sm">Accepter</button>
                  <button onclick="updateStatus('${request.id}', 'CANCELLED')" class="btn btn-outline btn-sm">Refuser</button>
                ` : ''}
                ${request.status === 'ACCEPTED' ? `
                  <button onclick="updateStatus('${request.id}', 'COMPLETED')" class="btn btn-success btn-sm">Terminer</button>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function updateStatus(requestId, status) {
      const result = Search.updateRequestStatus(requestId, status);
      
      if (result.success) {
        Utils.showToast('Statut mis à jour', 'success');
        loadDashboard();
      } else {
        Utils.showToast(result.message, 'error');
      }
    }
    
    function logout() {
      if (confirm('Voulez-vous vous déconnecter ?')) {
        Utils.Session.logout();
        Utils.showToast('Déconnexion réussie', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      }
    }
  </script>
</body>
</html>
