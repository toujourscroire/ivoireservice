<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Prestataire - Ivoiservice</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇨🇮</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 1rem;
      transition: all 0.3s;
    }
    
    .back-btn:hover {
      gap: 0.75rem;
    }
    
    .map-container {
      width: 100%;
      height: 350px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-top: 2rem;
      box-shadow: var(--shadow-md);
    }
    
    .map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    
    .portfolio-item {
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: transform 0.3s;
      cursor: pointer;
    }
    
    .portfolio-item:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }
    
    .portfolio-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--background);
    }
    
    .portfolio-info {
      padding: 1rem;
      background: white;
    }
    
    .portfolio-info h4 {
      margin: 0 0 0.5rem 0;
      color: var(--text);
      font-size: 1rem;
    }
    
    .portfolio-info p {
      margin: 0;
      color: var(--text-light);
      font-size: 0.875rem;
      line-height: 1.5;
    }
    
    .freelance-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-full);
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 1rem;
    }
    
    .distance-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--primary-soft);
      color: var(--primary-dark);
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <i class="fas fa-handshake"></i>
          <span>Ivoiservice</span>
        </a>
        <ul class="nav-links">
          <li><a href="search.html" class="back-btn"><i class="fas fa-arrow-left"></i> Retour à la recherche</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="services">
    <div class="container">
      <div style="max-width: 1000px; margin: 0 auto;">
        <!-- Bouton Retour supplémentaire -->
        <a href="search.html" class="back-btn">
          <i class="fas fa-arrow-left"></i>
          Retour à la recherche
        </a>
        
        <div id="providerContent"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Ivoiservice. Tous droits réservés. 🇨🇮</p>
      </div>
    </div>
  </footer>

  <!-- Modal Contact -->
  <div class="modal" id="contactModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeContactModal()"><i class="fas fa-times"></i></button>
      <h2 style="margin-bottom: 1rem;"><i class="fas fa-paper-plane text-primary"></i> Demander un service</h2>
      <div class="form-group">
        <label class="form-label">Décrivez votre besoin</label>
        <textarea id="serviceDescription" class="form-input" rows="5" placeholder="Exemple : J'ai besoin d'un plombier pour réparer une fuite dans ma salle de bain..."></textarea>
      </div>
      <button onclick="sendServiceRequest()" class="btn btn-primary btn-full">
        <i class="fas fa-paper-plane"></i> Envoyer la demande
      </button>
    </div>
  </div>

  <!-- Modal Portfolio Image -->
  <div class="modal" id="portfolioModal">
    <div class="modal-content" style="max-width: 800px;">
      <button class="modal-close" onclick="closePortfolioModal()"><i class="fas fa-times"></i></button>
      <div id="portfolioModalContent"></div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/search.js"></script>
  <script src="js/subscription.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const providerId = urlParams.get('id');
    
    if (!providerId) {
      window.location.href = 'search.html';
    } else {
      loadProviderProfile();
    }
    
    function loadProviderProfile() {
      const provider = Search.getProviderById(providerId);
      
      if (!provider) {
        document.getElementById('providerContent').innerHTML = `
          <div class="alert alert-error">Prestataire non trouvé</div>
        `;
        return;
      }
      
      const professionIcon = Utils.PROFESSION_ICONS[provider.profession] || 'fa-briefcase';
      const professionName = Utils.PROFESSIONS[provider.profession] || Utils.FREELANCE_PROFESSIONS[provider.profession] || provider.profession;
      
      let portfolioSection = '';
      if (provider.isFreelance && provider.portfolio && provider.portfolio.length > 0) {
        portfolioSection = `
          <div class="card mt-lg">
            <h3 style="margin-bottom: 1.5rem;">
              <i class="fas fa-briefcase text-primary"></i> Portfolio
            </h3>
            <div class="portfolio-grid">
              ${provider.portfolio.map((item, index) => `
                <div class="portfolio-item" onclick="openPortfolioModal(${index})">
                  <img src="${item.imageUrl}" alt="${item.title}" class="portfolio-image">
                  <div class="portfolio-info">
                    <h4>${item.title}</h4>
                    <p>${item.description}</p>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
      
      // Carte Google Maps
      const mapSection = provider.latitude && provider.longitude ? `
        <div class="card mt-lg">
          <h3 style="margin-bottom: 1rem;">
            <i class="fas fa-map-marked-alt text-primary"></i> Localisation
          </h3>
          <div class="map-container">
            <iframe 
              src="https://maps.google.com/maps?q=${provider.latitude},${provider.longitude}&z=14&output=embed"
              allowfullscreen
              loading="lazy">
            </iframe>
          </div>
          ${provider.distance ? `
            <div style="margin-top: 1rem; text-align: center;">
              <span class="distance-badge">
                <i class="fas fa-route"></i>
                Distance : ${provider.distance.toFixed(1)} km de votre position
              </span>
            </div>
          ` : ''}
        </div>
      ` : '';
      
      document.getElementById('providerContent').innerHTML = `
        <div class="card">
          <div style="display: flex; align-items: flex-start; gap: 2rem; flex-wrap: wrap;">
            <div style="flex: 0 0 150px; height: 150px; background: linear-gradient(135deg, var(--primary-soft) 0%, var(--primary) 100%); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: white; font-size: 4rem;">
              <i class="fas ${professionIcon}"></i>
            </div>
            <div style="flex: 1; min-width: 250px;">
              <h1 style="font-size: 2rem; margin-bottom: 0.5rem; display: flex; align-items: center; flex-wrap: wrap;">
                ${provider.firstName} ${provider.lastName}
                ${provider.isVerified ? '<i class="fas fa-check-circle" style="color: var(--success); font-size: 1.5rem; margin-left: 0.5rem;" title="Identité vérifiée"></i>' : ''}
                ${provider.isFreelance ? '<span class="freelance-badge">FREELANCE</span>' : ''}
              </h1>
              <p style="font-size: 1.25rem; color: var(--primary); font-weight: 600; margin-bottom: 1rem;">
                <i class="fas ${professionIcon}"></i> ${professionName}
              </p>
              <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                ${Utils.generateStars(provider.rating || 0)}
                <span style="font-weight: 600;">${(provider.rating || 0).toFixed(1)}</span>
                <span style="color: var(--text-light);">(${provider.reviewCount || 0} avis)</span>
              </div>
              <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                <span><i class="fas fa-map-marker-alt text-primary"></i> ${provider.isFreelance ? 'Zone' : 'Rayon'} ${provider.radius} km</span>
                <span><i class="fas fa-money-bill-wave text-primary"></i> ${Utils.formatPrice(provider.basePrice)}${provider.isFreelance ? '/mission' : ''}</span>
                <span><i class="fas fa-phone text-primary"></i> ${Utils.formatPhoneNumber(provider.phone)}</span>
              </div>
            </div>
          </div>
          
          <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
            <h3 style="margin-bottom: 1rem;">
              <i class="fas fa-info-circle text-primary"></i> 
              ${provider.isFreelance ? 'Compétences et expériences' : 'Description'}
            </h3>
            <p style="color: var(--text-light); line-height: 1.8;">
              ${provider.description || 'Aucune description disponible.'}
            </p>
          </div>
          
          <div style="margin-top: 2rem;">
            <button onclick="openContactModal()" class="btn btn-primary btn-lg btn-full">
              <i class="fas fa-paper-plane"></i> ${provider.isFreelance ? 'Proposer une mission' : 'Demander un service'}
            </button>
          </div>
        </div>
        
        ${portfolioSection}
        
        ${mapSection}
        
        <div class="card mt-lg">
          <h3 style="margin-bottom: 1.5rem;"><i class="fas fa-star text-warning"></i> Avis clients</h3>
          <div id="reviewsList"></div>
        </div>
      `;
      
      loadReviews();
      
      // Stocker le provider pour les modals
      window.currentProvider = provider;
    }
    
    function loadReviews() {
      const reviews = Search.getProviderReviews(providerId);
      const reviewsList = document.getElementById('reviewsList');
      
      if (reviews.length === 0) {
        reviewsList.innerHTML = '<p class="text-light text-center">Aucun avis pour le moment</p>';
        return;
      }
      
      reviewsList.innerHTML = reviews.map(review => `
        <div style="padding: 1.5rem; border-bottom: 1px solid var(--border);">
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <strong>${review.clientName}</strong>
            <span class="text-light">${Utils.formatDate(review.createdAt)}</span>
          </div>
          <div style="margin-bottom: 0.5rem;">
            ${Utils.generateStars(review.rating)}
          </div>
          <p style="color: var(--text-light);">${review.comment}</p>
        </div>
      `).join('');
    }
    
    function openContactModal() {
      if (!Utils.Session.isLoggedIn()) {
        Utils.showToast('Vous devez être connecté', 'error');
        setTimeout(() => window.location.href = 'login.html', 1000);
        return;
      }
      
      const user = Utils.Session.getCurrentUser();
      if (user.role !== 'CLIENT') {
        Utils.showToast('Seuls les clients peuvent contacter des prestataires', 'error');
        return;
      }
      
      if (!Auth.hasActiveSubscription(user.id)) {
        Utils.showToast('Vous devez avoir un abonnement actif', 'warning');
        setTimeout(() => window.location.href = 'subscription.html', 1500);
        return;
      }
      
      document.getElementById('contactModal').classList.add('show');
    }
    
    function closeContactModal() {
      document.getElementById('contactModal').classList.remove('show');
    }
    
    function sendServiceRequest() {
      const description = document.getElementById('serviceDescription').value.trim();
      
      if (!description) {
        Utils.showToast('Veuillez décrire votre besoin', 'error');
        return;
      }
      
      const result = Search.createServiceRequest(providerId, description);
      
      if (result.success) {
        Utils.showToast('Demande envoyée avec succès !', 'success');
        closeContactModal();
        document.getElementById('serviceDescription').value = '';
      } else if (result.requireSubscription) {
        Utils.showToast(result.message, 'warning');
        setTimeout(() => window.location.href = 'subscription.html', 1500);
      } else {
        Utils.showToast(result.message, 'error');
      }
    }
    
    // Modal Portfolio
    function openPortfolioModal(index) {
      const provider = window.currentProvider;
      const item = provider.portfolio[index];
      
      document.getElementById('portfolioModalContent').innerHTML = `
        <img src="${item.imageUrl}" alt="${item.title}" style="width: 100%; border-radius: var(--radius-lg); margin-bottom: 1rem;">
        <h3 style="margin-bottom: 0.5rem;">${item.title}</h3>
        <p style="color: var(--text-light); line-height: 1.6;">${item.description}</p>
      `;
      
      document.getElementById('portfolioModal').classList.add('show');
    }
    
    function closePortfolioModal() {
      document.getElementById('portfolioModal').classList.remove('show');
    }
  </script>
</body>
</html>
