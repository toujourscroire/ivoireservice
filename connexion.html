<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Ivoiservice</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇨🇮</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #4CAF50;
      --primary-dark: #388E3C;
      --primary-soft: #E8F5E9;
      --text: #212121;
      --text-light: #666;
      --border: #e0e0e0;
      --radius: 8px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .auth-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 2.5rem;
      max-width: 450px;
      width: 100%;
      animation: slideIn 0.5s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
    .logo p { color: var(--text-light); font-size: 0.95rem; }
    .logout-section {
      background: #FFF3E0;
      padding: 1rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      border-left: 4px solid #FF9800;
      display: none;
    }
    .logout-section.active { display: block; }
    .alert {
      padding: 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    .alert.show { display: flex; }
    .alert-error { background: #FFEBEE; color: #C62828; border: 1px solid #EF5350; }
    .alert-success { background: #E8F5E9; color: #2E7D32; border: 1px solid #66BB6A; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text); }
    .input-wrapper { position: relative; }
    .input-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
    }
    .input-wrapper input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      transition: all 0.3s;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }
    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(76,175,80,0.3);
    }
    .btn-secondary { background: #f44336; color: white; margin-bottom: 1rem; }
    .btn-secondary:hover { background: #d32f2f; }
    .demo-accounts {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--primary-soft);
      border-radius: var(--radius);
    }
    .demo-accounts h3 {
      font-size: 0.9rem;
      color: var(--primary-dark);
      margin-bottom: 0.5rem;
    }
    .demo-accounts p {
      font-size: 0.85rem;
      color: var(--text);
      margin: 0.25rem 0;
    }
    .back-link { text-align: center; margin-top: 1rem; }
    .back-link a {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo">
      <h1>🇨🇮 Ivoiservice</h1>
      <p>Connectez-vous à votre compte</p>
    </div>

    <div class="logout-section" id="logoutSection">
      <p style="font-weight: 600; margin-bottom: 0.5rem;">
        <i class="fas fa-user-check"></i> Vous êtes déjà connecté
      </p>
      <p id="userInfo" style="font-size: 0.9rem; margin-bottom: 1rem;"></p>
      <button class="btn btn-secondary" onclick="forceLogout()">
        <i class="fas fa-sign-out-alt"></i> Se déconnecter
      </button>
    </div>

    <div id="loginFormSection">
      <div class="alert alert-error" id="alertError">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMessage"></span>
      </div>
      
      <div class="alert alert-success" id="alertSuccess">
        <i class="fas fa-check-circle"></i>
        <span id="successMessage"></span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" required placeholder="votre.email@exemple.ci" autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" required placeholder="Votre mot de passe" autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn btn-primary">
          <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
      </form>

      <div class="demo-accounts">
        <h3><i class="fas fa-info-circle"></i> Comptes de démonstration</h3>
        <p><strong>Client:</strong> client@demo.com / demo123</p>
        <p><strong>Prestataire:</strong> prestataire@demo.com / demo123</p>
        <p style="color: var(--text-light); font-size: 0.8rem; margin-top: 0.5rem;">
          <i class="fas fa-shield-alt"></i> Le compte admin n'est pas public
        </p>
      </div>

      <div class="back-link">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Retour à l'accueil</a>
      </div>
    </div>
  </div>

  <script>
    const Storage = {
      get: (key, defaultValue = null) => {
        try {
          const item = localStorage.getItem(key);
          return item ? JSON.parse(item) : defaultValue;
        } catch (e) {
          console.error('Storage error:', e);
          return defaultValue;
        }
      },
      set: (key, value) => {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
          console.error('Storage error:', e);
        }
      }
    };

    const Session = {
      login: (user) => {
        Storage.set('currentUser', user);
        Storage.set('isLoggedIn', true);
      },
      logout: () => {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('isLoggedIn');
      },
      isLoggedIn: () => Storage.get('isLoggedIn', false) === true,
      getCurrentUser: () => Storage.get('currentUser', null)
    };

    function hashPassword(password) {
      let hash = 0;
      for (let i = 0; i < password.length; i++) {
        const char = password.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return 'hashed_' + Math.abs(hash).toString(36).substring(0, 6);
    }

    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    const ADMIN_EMAIL = 'admin@ivoiservice.ci';
    const ADMIN_PASSWORD = 'admin2024';

    function initDemoUsers() {
      const users = Storage.get('users', []);
      if (users.length === 0) {
        const demoUsers = [
          {
            id: generateUUID(),
            email: 'client@demo.com',
            password: hashPassword('demo123'),
            firstName: 'Kouassi',
            lastName: 'Konan',
            phone: '+2250701020304',
            role: 'CLIENT',
            latitude: 5.3213,
            longitude: -4.0114,
            createdAt: Date.now()
          },
          {
            id: generateUUID(),
            email: 'prestataire@demo.com',
            password: hashPassword('demo123'),
            firstName: 'Adjoua',
            lastName: 'Yao',
            phone: '+2250705060708',
            role: 'PROVIDER',
            latitude: 5.3480,
            longitude: -3.9838,
            createdAt: Date.now()
          }
        ];
        Storage.set('users', demoUsers);
        
        Storage.set('providerProfiles', [{
          id: generateUUID(),
          userId: demoUsers[1].id,
          profession: 'PLOMBIER',
          basePrice: 15000,
          radius: 10,
          description: 'Plombier professionnel. Intervention rapide.',
          photos: [],
          rating: 4.5,
          reviewCount: 12,
          isVerified: true,
          isFreelance: false,
          createdAt: Date.now()
        }]);
        
        Storage.set('subscriptions', [{
          id: generateUUID(),
          userId: demoUsers[0].id,
          amount: 5000,
          duration: 30,
          startDate: Date.now(),
          endDate: Date.now() + (30 * 24 * 60 * 60 * 1000),
          status: 'ACTIVE',
          createdAt: Date.now()
        }]);
        
        console.log('✅ Demo users created');
      }
    }

    function showError(message) {
      const alert = document.getElementById('alertError');
      document.getElementById('errorMessage').textContent = message;
      alert.classList.add('show');
      setTimeout(() => alert.classList.remove('show'), 5000);
    }

    function showSuccess(message) {
      const alert = document.getElementById('alertSuccess');
      document.getElementById('successMessage').textContent = message;
      alert.classList.add('show');
    }

    function checkLoginStatus() {
      if (Session.isLoggedIn()) {
        const user = Session.getCurrentUser();
        document.getElementById('logoutSection').classList.add('active');
        document.getElementById('loginFormSection').style.display = 'none';
        document.getElementById('userInfo').innerHTML = `
          <strong>${user.firstName} ${user.lastName}</strong><br>
          <span style="color: var(--text-light);">${user.email} - ${user.role}</span>
        `;
      }
    }

    function forceLogout() {
      Session.logout();
      document.getElementById('logoutSection').classList.remove('active');
      document.getElementById('loginFormSection').style.display = 'block';
      showSuccess('Déconnexion réussie');
    }

    function login(email, password) {
      if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
        const adminUser = {
          id: generateUUID(),
          email: ADMIN_EMAIL,
          firstName: 'Admin',
          lastName: 'Master',
          phone: '+2250700000000',
          role: 'ADMIN',
          createdAt: Date.now()
        };
        Session.login(adminUser);
        return { success: true, user: adminUser };
      }

      const users = Storage.get('users', []);
      const hashedPassword = hashPassword(password);
      const user = users.find(u => u.email === email && u.password === hashedPassword);

      if (user) {
        const userSession = { ...user };
        delete userSession.password;
        Session.login(userSession);
        return { success: true, user: userSession };
      }

      return { success: false, message: 'Email ou mot de passe incorrect' };
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !email.includes('@')) {
        showError('Adresse email invalide');
        return;
      }

      if (!password || password.length < 6) {
        showError('Mot de passe requis (minimum 6 caractères)');
        return;
      }

      const result = login(email, password);

      if (result.success) {
        showSuccess('✅ Connexion réussie ! Redirection...');
        
        setTimeout(() => {
          let url = 'client-dashboard.html';
          if (result.user.role === 'PROVIDER') url = 'provider-dashboard.html';
          if (result.user.role === 'ADMIN') url = 'admin-dashboard.html';
          window.location.href = url;
        }, 1500);
      } else {
        showError(result.message);
      }
    });

    initDemoUsers();
    checkLoginStatus();
    
    console.log('✅ Login page ready');
  </script>
</body>
</html>
