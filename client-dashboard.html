<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Client - Ivoiservice</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇨🇮</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 1rem;
      transition: all 0.3s;
    }
    
    .back-btn:hover {
      gap: 0.75rem;
    }
    
    .subscription-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 2rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
    }
    
    .subscription-card h2 {
      margin: 0 0 1rem 0;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .days-remaining {
      font-size: 3rem;
      font-weight: 800;
      margin: 1rem 0;
    }
    
    .subscription-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .meta-item {
      background: rgba(255, 255, 255, 0.15);
      padding: 1rem;
      border-radius: var(--radius-md);
      backdrop-filter: blur(10px);
    }
    
    .meta-item strong {
      display: block;
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }
    
    .meta-item span {
      font-size: 0.875rem;
      opacity: 0.9;
    }
    
    .subscription-expired {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    }
    
    .history-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    
    .history-table th {
      background: var(--background);
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--text);
      border-bottom: 2px solid var(--border);
    }
    
    .history-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-light);
    }
    
    .history-table tr:hover {
      background: var(--background);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <i class="fas fa-handshake"></i>
          <span>Ivoiservice</span>
        </a>
        <ul class="nav-links">
          <li><a href="search.html">Rechercher</a></li>
          <li><button onclick="logout()" class="btn btn-outline btn-sm"><i class="fas fa-sign-out-alt"></i> Déconnexion</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="services">
    <div class="container">
      <!-- Bouton Retour -->
      <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
        Retour à l'accueil
      </a>
      
      <h1 class="section-title">
        <i class="fas fa-user-circle text-primary"></i>
        Mon espace client
      </h1>
      <p class="section-subtitle" id="welcomeMessage"></p>
      
      <!-- Statut abonnement -->
      <div id="subscriptionStatus" class="mb-lg"></div>
      
      <!-- Mes demandes -->
      <div class="card mb-lg">
        <h2><i class="fas fa-file-alt text-primary"></i> Mes demandes de service</h2>
        <div id="requestsList"></div>
      </div>
      
      <!-- Historique abonnements -->
      <div class="card">
        <h2><i class="fas fa-history text-primary"></i> Historique des abonnements</h2>
        <div id="subscriptionHistory"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Ivoiservice. Tous droits réservés. 🇨🇮</p>
      </div>
    </div>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/search.js"></script>
  <script src="js/subscription.js"></script>
  <script>
    if (!Utils.requireRole('CLIENT')) {
      // Redirection gérée par requireRole
    } else {
      loadDashboard();
    }
    
    function loadDashboard() {
      const user = Utils.Session.getCurrentUser();
      
      // Message de bienvenue
      document.getElementById('welcomeMessage').textContent = `Bienvenue ${user.firstName} ${user.lastName}`;
      
      loadSubscriptionStatus();
      loadRequests();
      loadSubscriptionHistory();
    }
    
    function loadSubscriptionStatus() {
      const user = Utils.Session.getCurrentUser();
      const info = Subscription.getSubscriptionInfo(user.id);
      
      const statusDiv = document.getElementById('subscriptionStatus');
      
      if (info.hasActive) {
        const subscription = info.subscription;
        const progressPercent = ((30 - info.daysRemaining) / 30 * 100).toFixed(0);
        
        statusDiv.innerHTML = `
          <div class="subscription-card">
            <h2>
              <i class="fas fa-crown"></i>
              Abonnement Actif
            </h2>
            <div class="days-remaining">
              ${info.daysRemaining} jour${info.daysRemaining > 1 ? 's' : ''}
            </div>
            <p style="opacity: 0.9; margin: 0;">restant${info.daysRemaining > 1 ? 's' : ''} sur votre abonnement</p>
            
            <div style="margin-top: 1.5rem;">
              <div style="background: rgba(255,255,255,0.2); height: 8px; border-radius: 10px; overflow: hidden;">
                <div style="background: white; height: 100%; width: ${progressPercent}%; transition: width 0.3s;"></div>
              </div>
              <p style="margin: 0.5rem 0 0; font-size: 0.875rem; opacity: 0.9;">Expire le ${Utils.formatDate(info.expirationDate)}</p>
            </div>
            
            <div class="subscription-meta">
              <div class="meta-item">
                <strong>${info.totalSubscriptions}</strong>
                <span>Abonnement${info.totalSubscriptions > 1 ? 's' : ''} total</span>
              </div>
              <div class="meta-item">
                <strong>${Utils.formatPrice(subscription.amount)}</strong>
                <span>Montant mensuel</span>
              </div>
              <div class="meta-item">
                <strong>${subscription.paymentMethod || 'N/A'}</strong>
                <span>Mode de paiement</span>
              </div>
            </div>
            
            <div style="margin-top: 1.5rem;">
              <a href="subscription.html" class="btn btn-outline btn-sm" style="background: white; color: var(--primary); border: none;">
                <i class="fas fa-redo"></i> Renouveler maintenant
              </a>
            </div>
          </div>
        `;
      } else {
        statusDiv.innerHTML = `
          <div class="subscription-card subscription-expired">
            <h2>
              <i class="fas fa-exclamation-triangle"></i>
              Abonnement Expiré
            </h2>
            <p style="font-size: 1.25rem; margin: 1.5rem 0;">
              Renouvelez votre abonnement pour continuer à contacter des prestataires
            </p>
            
            ${info.totalSubscriptions > 0 ? `
              <div class="subscription-meta">
                <div class="meta-item">
                  <strong>${info.totalSubscriptions}</strong>
                  <span>Abonnement${info.totalSubscriptions > 1 ? 's' : ''} passé${info.totalSubscriptions > 1 ? 's' : ''}</span>
                </div>
              </div>
            ` : ''}
            
            <div style="margin-top: 1.5rem;">
              <a href="subscription.html" class="btn btn-outline btn-sm" style="background: white; color: #e74c3c; border: none; font-weight: 700;">
                <i class="fas fa-shopping-cart"></i> Souscrire maintenant - 5000 FCFA
              </a>
            </div>
          </div>
        `;
      }
    }
    
    function loadRequests() {
      const user = Utils.Session.getCurrentUser();
      const requests = Search.getClientRequests(user.id);
      const requestsList = document.getElementById('requestsList');
      
      if (requests.length === 0) {
        requestsList.innerHTML = `
          <p class="text-light text-center" style="padding: 2rem;">
            <i class="fas fa-inbox" style="font-size: 3rem; display: block; margin-bottom: 1rem; opacity: 0.5;"></i>
            Aucune demande pour le moment
          </p>
        `;
        return;
      }
      
      const users = Utils.Storage.get('users', []);
      const sortedRequests = requests.sort((a, b) => b.createdAt - a.createdAt);
      
      requestsList.innerHTML = sortedRequests.map(request => {
        const provider = users.find(u => u.id === request.providerId);
        const statusConfig = {
          PENDING: { color: 'warning', icon: 'clock', text: 'En attente' },
          ACCEPTED: { color: 'success', icon: 'check', text: 'Accepté' },
          COMPLETED: { color: 'success', icon: 'check-circle', text: 'Terminé' },
          CANCELLED: { color: 'error', icon: 'times', text: 'Annulé' }
        };
        const status = statusConfig[request.status] || statusConfig.PENDING;
        
        return `
          <div style="padding: 1.5rem; border-bottom: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
              <div style="flex: 1; min-width: 250px;">
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                  <strong style="font-size: 1.125rem;">${provider ? provider.firstName + ' ' + provider.lastName : 'Prestataire'}</strong>
                </div>
                <p style="color: var(--text-light); margin: 0.5rem 0; line-height: 1.6;">${request.description}</p>
                <small class="text-light">
                  <i class="fas fa-calendar"></i> ${Utils.formatDateTime(request.createdAt)}
                </small>
              </div>
              <span class="badge badge-${status.color}">
                <i class="fas fa-${status.icon}"></i> ${status.text}
              </span>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function loadSubscriptionHistory() {
      const user = Utils.Session.getCurrentUser();
      const history = Auth.getUserSubscriptionHistory(user.id);
      const historyDiv = document.getElementById('subscriptionHistory');
      
      if (history.length === 0) {
        historyDiv.innerHTML = `
          <p class="text-light text-center" style="padding: 2rem;">
            Aucun historique d'abonnement
          </p>
        `;
        return;
      }
      
      historyDiv.innerHTML = `
        <table class="history-table">
          <thead>
            <tr>
              <th><i class="fas fa-calendar"></i> Date</th>
              <th><i class="fas fa-calendar-check"></i> Début</th>
              <th><i class="fas fa-calendar-times"></i> Fin</th>
              <th><i class="fas fa-money-bill-wave"></i> Montant</th>
              <th><i class="fas fa-credit-card"></i> Paiement</th>
              <th><i class="fas fa-info-circle"></i> Statut</th>
            </tr>
          </thead>
          <tbody>
            ${history.map(sub => {
              const statusConfig = {
                ACTIVE: { color: 'success', icon: 'check-circle', text: 'Actif' },
                EXPIRED: { color: 'error', icon: 'times-circle', text: 'Expiré' },
                CANCELLED: { color: 'warning', icon: 'ban', text: 'Annulé' }
              };
              const status = statusConfig[sub.status] || statusConfig.EXPIRED;
              
              return `
                <tr>
                  <td>${Utils.formatDate(sub.createdAt)}</td>
                  <td>${Utils.formatDate(sub.startDate)}</td>
                  <td>${Utils.formatDate(sub.endDate)}</td>
                  <td><strong>${Utils.formatPrice(sub.amount)}</strong></td>
                  <td>${sub.paymentMethod || 'N/A'}</td>
                  <td>
                    <span class="badge badge-${status.color}">
                      <i class="fas fa-${status.icon}"></i> ${status.text}
                    </span>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }
    
    function logout() {
      if (confirm('Voulez-vous vous déconnecter ?')) {
        Utils.Session.logout();
        Utils.showToast('À bientôt !', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      }
    }
  </script>
</body>
</html>
